<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante 593</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }

        header {
            background: #8B0000;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 { font-size: 2em; }
        header p { font-size: 1em; opacity: 0.8; margin-top: 5px; }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .campo { margin-bottom: 20px; }
        .campo label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .campo input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        h2 { color: #8B0000; margin: 20px 0 10px; font-size: 1.3em; }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #8B0000; color: white; }
        th, td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        tr:hover { background: #fff8f8; }

        .cantidad-input {
            width: 60px;
            padding: 8px 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 1em;
        }

        .btn-enviar {
            background: #8B0000;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn-enviar:hover { background: #a00000; }
        .btn-enviar:active { background: #600000; }

        .ver-ventas {
            display: block;
            text-align: center;
            margin: 20px auto;
            color: #8B0000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            padding: 12px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ===== RESPONSIVE MÓVIL ===== */
        @media (max-width: 600px) {
            header h1 { font-size: 1.4em; }
            header p { font-size: 0.85em; }

            .container { padding: 0 10px; margin: 15px auto; }

            form { padding: 15px; }

            table { font-size: 0.82em; }
            th, td { padding: 8px 6px; }

            .cantidad-input {
                width: 50px;
                padding: 6px 3px;
                font-size: 0.95em;
            }

            .btn-enviar {
                padding: 14px;
                font-size: 1em;
            }

            /* Tabla scrolleable si es muy ancha */
            .tabla-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>🍽️ Restaurante 593</h1>
    <p>Sabores del Ecuador</p>
</header>

<div class="container">
    <form action="/pedido" method="POST">

        <div class="campo">
            <label for="cliente">👤 Nombre del cliente:</label>
            <input type="text" id="cliente" name="cliente"
                   placeholder="Ingresa tu nombre" required
                   autocomplete="off">
        </div>

        <h2>🍴 Selecciona tu pedido:</h2>

        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cant.</th>
                    </tr>
                </thead>
                <tbody>
                    {% for producto, precio in menu.items() %}
                    <tr>
                        <td>{{ producto }}</td>
                        <td>${{ "%.2f"|format(precio) }}</td>
                        <td>
                            <input type="hidden" name="producto" value="{{ producto }}">
                            <input type="number" name="cantidad"
                                   class="cantidad-input"
                                   min="0" value="0"
                                   inputmode="numeric">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <button type="submit" class="btn-enviar">✅ Registrar Pedido</button>
    </form>

    <a href="/ventas" class="ver-ventas">📊 Ver historial de ventas</a>
</div>

</body>
</html>
